# FORGE CONFIG (DO NOT REMOVE!)
include forge-conf/jerome-arfouche.ca/before/*;

server {
    http2 on;
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name jerome-arfouche.ca jerome-arfouche.com;
    server_tokens off;
    root /home/forge/jerome-arfouche.ca;

    # FORGE SSL (DO NOT REMOVE!)
    ssl_certificate /etc/nginx/ssl/jerome-arfouche.ca/2907366/server.crt;
    ssl_certificate_key /etc/nginx/ssl/jerome-arfouche.ca/2907366/server.key;

    ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
ssl_prefer_server_ciphers off;
ssl_dhparam /etc/nginx/dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    index index.html index.htm index.php;

    charset utf-8;

    # --- Compression ---
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/json application/javascript
        application/xml+rss application/atom+xml image/svg+xml
        font/woff font/woff2 application/font-woff application/font-woff2;

    # FORGE CONFIG (DO NOT REMOVE!)
    include forge-conf/jerome-arfouche.ca/server/*;

    # --- Bot / scanner mitigation ---
    # NOTE: To enable rate limiting, add this to the http{} block in /etc/nginx/nginx.conf:
    #   limit_req_zone $binary_remote_addr zone=general:10m rate=20r/m;
    # Then uncomment the line below:
    # limit_req zone=general burst=40 nodelay;

    # Drop connections from known scanner user agents
    if ($http_user_agent ~* "(zgrab|masscan|l9scan|leakix|CVE-|CyberConvoy|RecordedFuture|Go-http-client)") {
        return 444;
    }
    if ($http_user_agent = "") {
        return 444;
    }

    # WordPress / WP REST API probing — this site does not run WordPress
    location ~* ^/(wp-admin|wp-content|wp-includes|wp-json|wp-login\.php|wp-config\.php|xmlrpc\.php|wlwmanifest\.xml) {
        return 444;
    }

    # Joomla probing
    location ~* ^/(plugins/|administrator/|components/) {
        return 444;
    }

    # IoT / network device CVE probes (Hikvision, D-Link, QNAP, etc.)
    location ~* ^/(SDK/|HNAP1/|cgi-bin/|ssi\.cgi|partymgr/) {
        return 444;
    }

    # Exposed admin / debug endpoints
    location ~* ^/(actuator/|telescope/|solr/|zabbix/|jasperserver|debug/|manager/html) {
        return 444;
    }
    # --- End bot / scanner mitigation ---

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Long-lived caching for static, content-addressed-by-rarely-changing assets
    location ~* \.(?:woff2?|eot|ttf|otf|ico|png|jpg|jpeg|gif|svg|pdf)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    access_log off;
    error_log  /var/log/nginx/jerome-arfouche.ca-error.log error;

    error_page 404 /index.php;

    location ~ \.php$ {
        # Verify the file exists before calling PHP-FPM; prevents FastCGI errors
        # from webshell scans probing random filenames (koala.php, mac.php, etc.)
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        include fastcgi_params;
    }

    # Drop (not 403) so scanners get no signal
    location ~ /\.(?!well-known).* {
        return 444;
    }
}

# FORGE CONFIG (DO NOT REMOVE!)
include forge-conf/jerome-arfouche.ca/after/*;